<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ayur Astro 360 – Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:#f5edd8;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  font-family:'Cormorant Garamond',serif;
  position:relative;
}
.parchment{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 20%, #f0e2b8 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 80% 80%, #e8c97a 0%, #f0d9a0 30%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 10% 70%, #ede0c0 0%, transparent 60%),
    #f5edd8;
  z-index:0;
}
.splash-top{
  position:fixed;top:-40px;right:-30px;
  width:340px;height:220px;
  background:radial-gradient(ellipse 70% 60% at 60% 40%, rgba(210,160,60,0.28) 0%, rgba(230,185,80,0.12) 55%, transparent 80%);
  border-radius:60% 80% 55% 70%;
  z-index:1;
  animation:breathe 8s ease-in-out infinite;
}
.splash-bottom{
  position:fixed;bottom:-30px;right:60px;
  width:480px;height:280px;
  background:radial-gradient(ellipse 65% 55% at 55% 55%, rgba(210,155,50,0.32) 0%, rgba(230,190,80,0.14) 50%, transparent 75%);
  border-radius:55% 70% 65% 50%;
  z-index:1;
  animation:breathe 10s ease-in-out 2s infinite;
}
@keyframes breathe{
  0%,100%{transform:scale(1) rotate(0deg);opacity:1}
  50%{transform:scale(1.06) rotate(2deg);opacity:0.85}
}
.frame{
  position:fixed;inset:16px;
  border:1.5px solid rgba(195,140,40,0.55);
  pointer-events:none;z-index:10;
  animation:fadeIn 1.5s ease forwards;
}
.frame-corner{
  position:absolute;
  width:18px;height:18px;
  border-color:rgba(195,140,40,0.85);
  border-style:solid;
}
.frame-corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px}
.frame-corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
.frame-corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.frame-corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.mortar-wrap{
  position:fixed;bottom:60px;right:50px;
  width:200px;height:180px;
  z-index:3;opacity:0;
  animation:fadeIn 1.2s ease 0.5s forwards;
}
.leaves{
  position:fixed;bottom:50px;right:240px;
  width:80px;height:100px;
  z-index:3;opacity:0;
  animation:fadeIn 1.2s ease 0.8s forwards;
}
.zodiac-row{
  position:fixed;bottom:28px;left:26px;
  display:flex;gap:8px;align-items:flex-end;
  z-index:5;opacity:0;
  animation:fadeIn 1.4s ease 1s forwards;
}
.zodiac-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0.2rem;
  font-size:0.48rem;
  color:#8a5520;
  letter-spacing:0.06em;
  text-transform:uppercase;
  font-family:'Cinzel',serif;
  width:54px;
}
.zodiac-item svg{
  width:46px;
  height:52px;
  flex-shrink:0;
  filter:drop-shadow(0 1px 2px rgba(140,80,10,0.2));
  transition:transform 0.3s ease, filter 0.3s ease;
}
.zodiac-item:hover svg{
  transform:translateY(-2px) scale(1.08);
  filter:drop-shadow(0 3px 8px rgba(200,140,10,0.4));
}
.dried-flower{
  position:fixed;bottom:42px;right:210px;
  font-size:1.6rem;transform:rotate(-30deg);
  z-index:4;opacity:0;
  animation:fadeIn 1s ease 1.2s forwards;
  filter:drop-shadow(0 1px 2px rgba(180,110,30,0.3));
}
.stage{
  position:relative;z-index:8;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;
  margin-top:-80px;padding:0 2rem;
}
.ornament{
  font-size:0.9rem;color:#b8892a;letter-spacing:0.8em;
  opacity:0;animation:fadeIn 1s ease 0.4s forwards;margin-bottom:1rem;
}
.title{
  font-family:'Cinzel',serif;
font-size:clamp(2rem,5.5vw,5.2rem);font-weight:700;
font-variant: normal;
text-transform: none;
font-feature-settings: "smcp" 0, "c2sc" 0;
  background:linear-gradient(135deg,#8a4f08 0%,#c3871e 25%,#f5d878 50%,#c3871e 75%,#8a4f08 100%);
  background-size:240% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:0.06em;line-height:1.1;white-space:nowrap;min-height:1.2em;
  text-shadow:0 4px 12px rgba(115,65,20,0.24);
  filter:drop-shadow(0 2px 5px rgba(120,70,10,0.25));
  animation:shimmer 4s linear 3s infinite;
}
@keyframes shimmer{
  0%{background-position:0% center}100%{background-position:200% center}
}
.divider{
  display:flex;align-items:center;gap:12px;
  width:100%;max-width:520px;margin:1rem 0 0.5rem;
  opacity:0;animation:fadeIn 0.8s ease 4s forwards;
}
.divider-line{flex:1;height:0.5px;background:linear-gradient(to right,transparent,#c8952a,transparent)}
.divider-diamond{width:7px;height:7px;background:#c8952a;transform:rotate(45deg);flex-shrink:0}
.tagline{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(0.8rem,1.8vw,1.05rem);color:#7a4e20;
  letter-spacing:0.2em;text-transform:uppercase;
  opacity:0;animation:fadeIn 0.8s ease 4.3s forwards;margin-bottom:2rem;
}
.coming-soon{
  font-family:'Cinzel',serif;
  font-size:clamp(0.9rem,2.8vw,1.9rem);font-weight:400;
  color:#3d2608;letter-spacing:0.22em;min-height:1.5em;
  opacity:0;animation:fadeIn 0.1s ease 4.8s forwards;
}
.cursor{
  display:inline-block;width:2.5px;margin-left:2px;
  background:linear-gradient(to bottom,#c8952a,#a06818);
  border-radius:1px;vertical-align:baseline;
  animation:blink 0.75s step-end infinite;
}
.cursor-title{height:0.82em}.cursor-cs{height:0.7em}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeIn{to{opacity:1}}
.lotus-row{
  margin-top:1.5rem;font-size:1.2rem;color:#b8892a;letter-spacing:0.6em;
  opacity:0;animation:fadeIn 1s ease 7.5s forwards;
}
.mote{
  position:fixed;border-radius:50%;background:rgba(210,165,55,0.5);
  pointer-events:none;z-index:2;opacity:0;
  animation:floatMote var(--d) ease-in var(--dl) infinite;
}
@keyframes floatMote{
  0%{transform:translateY(0) scale(0.6);opacity:0}
  15%{opacity:0.6}85%{opacity:0.2}
  100%{transform:translateY(-100vh) scale(1.3);opacity:0}
}
</style>
</head>
<body>

<script>
const G = `<defs><linearGradient id="gG" x1="0%" y1="0%" x2="100%" y2="110%"><stop offset="0%" stop-color="#f8e090"/><stop offset="50%" stop-color="#d4941e"/><stop offset="100%" stop-color="#8a5010"/></linearGradient></defs>`;

  { name:'MESHA', label:'Aries', body:`${G}

    <line x1="32" y1="28" x2="36" y2="38" ${S} stroke-width="1.4" stroke-linecap="round"/>` },

  { name:'SIMHA', label:'Leo', body:`${G}
    <path d="M26 6 Q35 4 40 10 Q44 6 46 12 Q48 19 44 24 Q48 31 40 34 Q36 40 26 42 Q16 40 12 34 Q4 31 8 24 Q4 19 6 12 Q8 6 12 10 Q17 4 26 6Z" ${N} ${S} stroke-width="1.3"/>
    <ellipse cx="26" cy="25" rx="10" ry="9" ${N} ${S} stroke-width="1.7"/>
    <circle cx="21" cy="22" r="1.8" ${F}/>

  { name:'KANYA', label:'Virgo', body:`${G}
    <circle cx="26" cy="10" r="6" ${N} ${S} stroke-width="1.6"/>
    <path d="M32 8 Q38 5 40 11" ${N} ${S} stroke-width="1.3" ${R}/>
    <line x1="26" y1="16" x2="26" y2="38" ${S} stroke-width="1.7" stroke-linecap="round"/>
    <path d="M26 22 L14 32" ${N} ${S} stroke-width="1.5" ${R}/>
    <path d="M26 22 L38 32" ${N} ${S} stroke-width="1.5" ${R}/>
    <circle cx="21" cy="21" r="1.4" ${F}/>
    <circle cx="31" cy="21" r="1.4" ${F}/>` },

  { name:'TULA', label:'Libra', body:`${G}

    <circle cx="26" cy="14" r="4" ${N} ${S} stroke-width="1.6"/>

    <circle cx="36" cy="9" r="5" ${N} ${S} stroke-width="1.6"/>
    <path d="M36 14 Q34 24 30 32" ${N} ${S} stroke-width="1.7" ${R}/>

    <ellipse cx="30" cy="16" rx="11" ry="6" ${N} ${S} stroke-width="1.6" transform="rotate(-18,30,16)"/>

const zodiacRow = document.getElementById('zodiacRow');

ICONS.forEach((ic, i) => {
  const item = document.createElement('div');
  item.className = 'zodiac-item';
  item.style.cssText = `animation:fadeIn 0.6s ease ${1.0 + i * 0.12}s both;opacity:0`;

  const svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svgEl.setAttribute('viewBox','0 0 52 58');
  svgEl.setAttribute('xmlns','http://www.w3.org/2000/svg');
  svgEl.setAttribute('aria-label', ic.label);
  svgEl.innerHTML = ic.body;
  item.appendChild(svgEl);

  const label = document.createElement('span');
  label.textContent = ic.name;
  item.appendChild(label);
  zodiacRow.appendChild(item);
});

const moteContainer = document.getElementById('motes');
for(let i=0;i<18;i++){
  const m=document.createElement('div');
  m.className='mote';
  const sz=Math.random()*50+15;
  m.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${Math.random()*14+8}s;--dl:${Math.random()*10}s`;
  moteContainer.appendChild(m);
}

const titleEl=document.getElementById('mainTitle');
const comingSoonEl=document.getElementById('comingSoon');
const cursorTitle=document.getElementById('cursorTitle');
const cursorCS=document.getElementById('cursorCS');
let titleIdx=0,csIdx=0;
function typeTitle(){
  const text='Ayur Astro 360';
  if(titleIdx<text.length){
    // Insert before cursor so the cursor stays at the end of the typed text
    titleEl.insertBefore(document.createTextNode(text[titleIdx]),cursorTitle);
    titleIdx++;
    setTimeout(typeTitle,120);
  }
}
function typeCS(){
  const text='Coming Soon';
  if(csIdx<text.length){
    comingSoonEl.insertBefore(document.createTextNode(text[csIdx]),cursorCS);
    csIdx++;
    setTimeout(typeCS,100);
  }
}

setTimeout(typeTitle,2800);

setTimeout(typeCS,4900);
</script>
